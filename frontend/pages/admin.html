<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnIQ — Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .tab-bar { display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px; }
    .tab-btn { padding:10px 18px;font-size:13px;font-weight:500;border:none;background:none;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s; }
    .tab-btn.active { color:var(--primary);border-bottom-color:var(--primary); }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--surface);border-radius:var(--radius);padding:28px;width:90%;max-width:440px; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Admin Panel</div>
      <div class="topbar-right">
        <span class="badge badge-blue">Admin</span>
      </div>
    </div>
    <div class="page-body">

      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">Total students</div><div class="stat-value">342</div></div>
        <div class="stat-card"><div class="stat-label">Active courses</div><div class="stat-value" style="color:var(--primary);">12</div></div>
        <div class="stat-card"><div class="stat-label">Tests created</div><div class="stat-value">48</div></div>
        <div class="stat-card"><div class="stat-label">At-risk students</div><div class="stat-value" style="color:var(--danger);">14</div></div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('students',this)">Students</button>
        <button class="tab-btn" onclick="switchTab('courses',this)">Courses</button>
        <button class="tab-btn" onclick="switchTab('tests',this)">Tests</button>
      </div>

      <!-- STUDENTS TAB -->
      <div class="tab-content active" id="tab-students">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
          <input class="form-control" type="text" placeholder="Search students..." style="max-width:280px;" oninput="filterStudents(this.value)">
          <button class="btn btn-primary" onclick="document.getElementById('addStudentModal').classList.add('open')">+ Add Student</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
          <table class="table" id="studentsTable">
            <thead><tr><th>Student</th><th>Score</th><th>Rank</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="studentsBody"></tbody>
          </table>
        </div>
      </div>

      <!-- COURSES TAB -->
      <div class="tab-content" id="tab-courses">
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
          <button class="btn btn-primary">+ Add Course</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
          <table class="table">
            <thead><tr><th>Course</th><th>Students</th><th>Tests</th><th>Avg Score</th><th>Action</th></tr></thead>
            <tbody id="coursesBody"></tbody>
          </table>
        </div>
      </div>

      <!-- TESTS TAB -->
      <div class="tab-content" id="tab-tests">
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
          <button class="btn btn-primary">+ Create Test</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
          <table class="table">
            <thead><tr><th>Test name</th><th>Course</th><th>Questions</th><th>Duration</th><th>Action</th></tr></thead>
            <tbody id="testsBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add Student Modal -->
<div class="modal-overlay" id="addStudentModal">
  <div class="modal">
    <h3 style="font-size:16px;margin-bottom:18px;">Add New Student</h3>
    <div class="form-group"><label class="form-label">Full name</label><input class="form-control" placeholder="e.g. Arjun Kumar"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" placeholder="student@college.edu"></div>
    <div class="form-group"><label class="form-label">Department</label>
      <select class="form-control"><option>Computer Science</option><option>Information Technology</option><option>Electronics</option></select>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px;">
      <button class="btn btn-secondary" onclick="document.getElementById('addStudentModal').classList.remove('open')">Cancel</button>
      <button class="btn btn-primary" onclick="document.getElementById('addStudentModal').classList.remove('open')">Add Student</button>
    </div>
  </div>
</div>

<script src="../js/sidebar.js"></script>
<script>
  authGuard();
  injectSidebar('admin');

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  const students = [
    {name:'Priya Sharma',    email:'priya@college.edu',  score:'94%', rank:1,  status:'Active'},
    {name:'Arun Raj',        email:'arun@college.edu',   score:'91%', rank:2,  status:'Active'},
    {name:'Arjun Kumar',     email:'arjun@college.edu',  score:'78%', rank:14, status:'Active'},
    {name:'Divya Mohan',     email:'divya@college.edu',  score:'83%', rank:7,  status:'Active'},
    {name:'Rahul Nair',      email:'rahul@college.edu',  score:'55%', rank:60, status:'At risk'},
    {name:'Karthik S',       email:'karthik@college.edu',score:'48%', rank:85, status:'At risk'},
    {name:'Sneha Patel',     email:'sneha@college.edu',  score:'72%', rank:22, status:'Active'},
    {name:'Mohammed Ali',    email:'mali@college.edu',   score:'38%', rank:98, status:'At risk'},
  ];

  function renderStudents(list) {
    document.getElementById('studentsBody').innerHTML = list.map(s => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="avatar" style="font-size:11px;width:30px;height:30px;">${s.name.split(' ').map(n=>n[0]).join('')}</div>
            <div><p style="font-size:13px;font-weight:500;">${s.name}</p><p style="font-size:11px;color:var(--text-muted);">${s.email}</p></div>
          </div>
        </td>
        <td><span class="badge ${parseFloat(s.score)>=80?'badge-green':parseFloat(s.score)>=60?'badge-blue':'badge-amber'}">${s.score}</span></td>
        <td style="font-size:13px;">#${s.rank}</td>
        <td><span class="badge ${s.status==='Active'?'badge-green':'badge-red'}">${s.status}</span></td>
        <td><button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;">View</button></td>
      </tr>
    `).join('');
  }

  function filterStudents(q) {
    renderStudents(students.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.email.toLowerCase().includes(q.toLowerCase())));
  }

  renderStudents(students);

  document.getElementById('coursesBody').innerHTML = [
    {name:'Java Programming', students:89, tests:5, avg:'72%'},
    {name:'Data Structures',  students:95, tests:4, avg:'58%'},
    {name:'Aptitude',         students:120,tests:8, avg:'79%'},
    {name:'DBMS',             students:76, tests:3, avg:'61%'},
    {name:'OS Concepts',      students:82, tests:4, avg:'65%'},
  ].map(c=>`
    <tr>
      <td style="font-size:13px;font-weight:500;">${c.name}</td>
      <td style="font-size:13px;">${c.students}</td>
      <td style="font-size:13px;">${c.tests}</td>
      <td><span class="badge ${parseFloat(c.avg)>=75?'badge-green':'badge-blue'}">${c.avg}</span></td>
      <td><button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;">Edit</button></td>
    </tr>
  `).join('');

  document.getElementById('testsBody').innerHTML = [
    {name:'Java Unit Test 2',       course:'Java Programming', qs:20, dur:'30 min'},
    {name:'DS Trees & Graphs',      course:'Data Structures',  qs:25, dur:'40 min'},
    {name:'Aptitude Mock 4',        course:'Aptitude',         qs:30, dur:'45 min'},
    {name:'SQL Fundamentals',       course:'DBMS',             qs:20, dur:'30 min'},
    {name:'Process Scheduling',     course:'OS Concepts',      qs:15, dur:'25 min'},
  ].map(t=>`
    <tr>
      <td style="font-size:13px;font-weight:500;">${t.name}</td>
      <td style="font-size:12px;color:var(--text-muted);">${t.course}</td>
      <td style="font-size:13px;">${t.qs}</td>
      <td style="font-size:13px;">${t.dur}</td>
      <td style="display:flex;gap:6px;padding:12px 14px;">
        <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;">Edit</button>
        <button class="btn btn-danger" style="font-size:11px;padding:4px 10px;">Delete</button>
      </td>
    </tr>
  `).join('');
</script>
</body>
</html>
