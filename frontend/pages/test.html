<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnIQ — Test</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .test-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px; }
    .question-nav { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px; }
    .q-dot {
      width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:600;border:1px solid var(--border);cursor:pointer;
      background:var(--surface);color:var(--text-muted);transition:all 0.1s;
    }
    .q-dot.answered { background:var(--primary);color:white;border-color:var(--primary); }
    .q-dot.current  { border-color:var(--primary);color:var(--primary); }
    .q-dot.correct  { background:var(--success);color:white;border-color:var(--success); }
    .q-dot.wrong    { background:var(--danger);color:white;border-color:var(--danger); }
    .question-box { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px; }
    .q-meta { font-size:11px;color:var(--text-muted);margin-bottom:10px;display:flex;gap:10px; }
    .q-text { font-size:15px;line-height:1.7;font-weight:500; }
    .result-panel { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;text-align:center; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title" id="testTitle">Java Programming — Unit Test 2</div>
      <div class="topbar-right">
        <div class="timer-badge" id="timerDisplay">30:00</div>
      </div>
    </div>
    <div class="page-body">

      <!-- Start screen -->
      <div id="startScreen" class="card" style="max-width:500px;margin:0 auto;text-align:center;padding:36px;">
        <div style="font-size:40px;margin-bottom:16px;">📝</div>
        <h2 style="font-size:20px;margin-bottom:8px;">Java Programming</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">Unit Test 2 — OOP & Collections</p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;">
          <div class="stat-card"><div class="stat-label">Questions</div><div class="stat-value" style="font-size:20px;">10</div></div>
          <div class="stat-card"><div class="stat-label">Duration</div><div class="stat-value" style="font-size:20px;">30m</div></div>
          <div class="stat-card"><div class="stat-label">Marks</div><div class="stat-value" style="font-size:20px;">10</div></div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:14px;" onclick="startTest()">Start Test</button>
      </div>

      <!-- Test screen -->
      <div id="testScreen" style="display:none;">
        <div class="test-header">
          <div>
            <p style="font-size:13px;color:var(--text-muted);">Question <span id="qNum">1</span> of <span id="qTotal">10</span></p>
          </div>
          <div style="display:flex;gap:8px;">
            <span class="badge badge-green" id="answeredCount">0 answered</span>
            <span class="badge badge-gray" id="remainingCount">10 remaining</span>
          </div>
        </div>

        <div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;">
          <div class="progress-fill" id="qProgress" style="width:0%;background:var(--primary);transition:width 0.3s;"></div>
        </div>

        <div class="question-nav" id="questionNav"></div>

        <div class="question-box">
          <div class="q-meta">
            <span id="qDifficulty" class="badge badge-blue">Medium</span>
            <span>+1 mark</span>
          </div>
          <p class="q-text" id="qText"></p>
        </div>

        <div id="optionsContainer"></div>

        <div style="display:flex;justify-content:space-between;margin-top:16px;">
          <button class="btn btn-secondary" onclick="prevQuestion()" id="prevBtn">← Previous</button>
          <button class="btn btn-secondary" onclick="skipQuestion()">Skip</button>
          <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">Next →</button>
        </div>
        <div style="text-align:center;margin-top:12px;">
          <button class="btn btn-danger" onclick="submitTest()">Submit Test</button>
        </div>
      </div>

      <!-- Result screen -->
      <div id="resultScreen" style="display:none;">
        <div class="result-panel">
          <div style="font-size:48px;margin-bottom:12px;" id="resultEmoji">🎉</div>
          <h2 style="font-size:24px;margin-bottom:6px;" id="resultTitle">Test Complete!</h2>
          <p style="color:var(--text-muted);margin-bottom:24px;" id="resultSub"></p>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;">
            <div class="stat-card"><div class="stat-label">Score</div><div class="stat-value" id="rScore" style="font-size:22px;color:var(--primary);"></div></div>
            <div class="stat-card"><div class="stat-label">Correct</div><div class="stat-value" id="rCorrect" style="font-size:22px;color:var(--success);"></div></div>
            <div class="stat-card"><div class="stat-label">Wrong</div><div class="stat-value" id="rWrong" style="font-size:22px;color:var(--danger);"></div></div>
            <div class="stat-card"><div class="stat-label">Skipped</div><div class="stat-value" id="rSkipped" style="font-size:22px;color:var(--text-muted);"></div></div>
          </div>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="retakeTest()">Retake Test</button>
            <a href="analytics.html"><button class="btn btn-secondary">View Analytics</button></a>
            <a href="dashboard.html"><button class="btn btn-secondary">Dashboard</button></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../js/sidebar.js"></script>
<script>
  authGuard();
  injectSidebar('test');

  const questions = [
    {q:'Which of the following best describes method overloading in Java?', opts:['Same name, different return types','Same name, different parameter lists','Different names, same parameters','A method calling itself'], ans:1, diff:'Easy'},
    {q:'What is the output of: System.out.println(10 / 3)?', opts:['3.33','3','4','Error'], ans:1, diff:'Easy'},
    {q:'Which collection class allows duplicate elements and maintains insertion order?', opts:['HashSet','TreeSet','ArrayList','HashMap'], ans:2, diff:'Medium'},
    {q:'What does the "final" keyword do when applied to a variable?', opts:['Makes it static','Prevents subclassing','Makes it constant','Both A and B'], ans:2, diff:'Medium'},
    {q:'Which interface must be implemented to use an object in a for-each loop?', opts:['Iterator','Iterable','Collection','Comparable'], ans:1, diff:'Medium'},
    {q:'What is polymorphism in OOP?', opts:['One class with many objects','Many forms of a method','Hiding implementation','Inheriting from multiple classes'], ans:1, diff:'Easy'},
    {q:'Which access modifier makes a member visible only within its class?', opts:['public','protected','default','private'], ans:3, diff:'Easy'},
    {q:'What is the default value of an int array element in Java?', opts:['null','undefined','0','-1'], ans:2, diff:'Medium'},
    {q:'Which HashMap method returns null if a key does not exist?', opts:['getKey()','get()','fetch()','find()'], ans:1, diff:'Hard'},
    {q:'What is the time complexity of searching in a balanced BST?', opts:['O(1)','O(n)','O(log n)','O(n log n)'], ans:2, diff:'Hard'},
  ];

  let current = 0;
  let answers = new Array(questions.length).fill(null);
  let timerInterval = null;
  let secondsLeft = 30 * 60;

  function startTest() {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('testScreen').style.display = 'block';
    buildNav();
    renderQuestion();
    startTimer();
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      secondsLeft--;
      const m = Math.floor(secondsLeft / 60);
      const s = secondsLeft % 60;
      document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      if (secondsLeft <= 300) document.getElementById('timerDisplay').style.background = '#fef2f2';
      if (secondsLeft <= 0) submitTest();
    }, 1000);
  }

  function buildNav() {
    document.getElementById('questionNav').innerHTML = questions.map((q,i) =>
      `<div class="q-dot ${i===current?'current':''}" id="qdot${i}" onclick="goTo(${i})">${i+1}</div>`
    ).join('');
  }

  function renderQuestion() {
    const q = questions[current];
    document.getElementById('qNum').textContent = current + 1;
    document.getElementById('qTotal').textContent = questions.length;
    document.getElementById('qText').textContent = q.q;
    document.getElementById('qDifficulty').textContent = q.diff;
    document.getElementById('qDifficulty').className = `badge ${q.diff==='Easy'?'badge-green':q.diff==='Hard'?'badge-red':'badge-blue'}`;
    document.getElementById('qProgress').style.width = ((current + 1) / questions.length * 100) + '%';
    document.getElementById('prevBtn').disabled = current === 0;

    document.getElementById('optionsContainer').innerHTML = q.opts.map((opt, i) => `
      <div class="option ${answers[current]===i?'selected':''}" onclick="selectAnswer(${i})">
        <div class="option-circle">${String.fromCharCode(65+i)}</div>
        <span style="font-size:14px;">${opt}</span>
      </div>
    `).join('');

    buildNav();
    document.querySelectorAll('.q-dot').forEach((d,i) => {
      d.className = `q-dot ${i===current?'current':answers[i]!==null?'answered':''}`;
    });

    const answered = answers.filter(a => a !== null).length;
    document.getElementById('answeredCount').textContent = `${answered} answered`;
    document.getElementById('remainingCount').textContent = `${questions.length - answered} remaining`;
  }

  function selectAnswer(i) {
    answers[current] = i;
    renderQuestion();
  }

  function nextQuestion() {
    if (current < questions.length - 1) { current++; renderQuestion(); }
    else submitTest();
  }

  function prevQuestion() {
    if (current > 0) { current--; renderQuestion(); }
  }

  function skipQuestion() {
    nextQuestion();
  }

  function goTo(i) { current = i; renderQuestion(); }

  function submitTest() {
    clearInterval(timerInterval);
    let correct = 0, wrong = 0, skipped = 0;
    answers.forEach((a, i) => {
      if (a === null) skipped++;
      else if (a === questions[i].ans) correct++;
      else wrong++;
    });
    const score = Math.round((correct / questions.length) * 100);
    document.getElementById('testScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('rScore').textContent = score + '%';
    document.getElementById('rCorrect').textContent = correct;
    document.getElementById('rWrong').textContent = wrong;
    document.getElementById('rSkipped').textContent = skipped;
    document.getElementById('resultEmoji').textContent = score >= 80 ? '🏆' : score >= 60 ? '👍' : '📖';
    document.getElementById('resultTitle').textContent = score >= 80 ? 'Excellent work!' : score >= 60 ? 'Good effort!' : 'Keep practising!';
    document.getElementById('resultSub').textContent = `You scored ${score}% on Java Programming Unit Test 2`;
  }

  function retakeTest() {
    answers = new Array(questions.length).fill(null);
    current = 0;
    secondsLeft = 30 * 60;
    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('testScreen').style.display = 'block';
    document.getElementById('timerDisplay').style.background = '';
    renderQuestion();
    startTimer();
  }
</script>
</body>
</html>
