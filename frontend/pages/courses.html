<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnIQ — Courses</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .course-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .course-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .course-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; font-size: 18px;
    }
    .course-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .course-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .search-wrap { position: relative; margin-bottom: 20px; }
    .search-wrap input { padding-left: 36px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title">Courses</div>
      <div class="topbar-right">
        <button class="btn btn-primary" style="font-size:12px;padding:7px 14px;">+ Enroll New</button>
      </div>
    </div>
    <div class="page-body">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
        <input class="form-control" type="text" placeholder="Search courses..." id="searchInput" oninput="filterCourses()" style="max-width:320px;">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">All courses</button>
        <button class="filter-tab" onclick="setFilter('inprogress',this)">In progress</button>
        <button class="filter-tab" onclick="setFilter('completed',this)">Completed</button>
        <button class="filter-tab" onclick="setFilter('notstarted',this)">Not started</button>
      </div>
      <div class="course-grid" id="courseGrid"></div>
    </div>
  </div>
</div>
<script src="../js/sidebar.js"></script>
<script>
  authGuard();
  injectSidebar('courses');

  const allCourses = [
    {id:1, title:'Java Programming', sub:'OOP, Collections, JDBC, Multithreading', pct:72, icon:'☕', color:'#dbeafe', status:'inprogress', chapters:12, tests:5},
    {id:2, title:'Data Structures', sub:'Arrays, Linked Lists, Trees, Graphs', pct:45, icon:'🌲', color:'#fee2e2', status:'inprogress', chapters:10, tests:4},
    {id:3, title:'Aptitude', sub:'Quantitative, Logical, Verbal Reasoning', pct:90, icon:'🧠', color:'#d1fae5', status:'completed', chapters:8, tests:8},
    {id:4, title:'DBMS', sub:'SQL, Normalization, Transactions', pct:30, icon:'🗄️', color:'#fef3c7', status:'inprogress', chapters:9, tests:3},
    {id:5, title:'OS Concepts', sub:'Processes, Memory, Scheduling, I/O', pct:60, icon:'⚙️', color:'#ede9fe', status:'inprogress', chapters:11, tests:4},
    {id:6, title:'Computer Networks', sub:'TCP/IP, Protocols, OSI Model', pct:15, icon:'🌐', color:'#fce7f3', status:'inprogress', chapters:8, tests:3},
    {id:7, title:'Python Basics', sub:'Syntax, Functions, OOP, Libraries', pct:0, icon:'🐍', color:'#d1fae5', status:'notstarted', chapters:10, tests:5},
    {id:8, title:'Software Engineering', sub:'SDLC, Design Patterns, Testing', pct:0, icon:'📐', color:'#e0f2fe', status:'notstarted', chapters:7, tests:2},
  ];

  let currentFilter = 'all';
  let currentSearch = '';

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCourses();
  }

  function filterCourses() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase();
    renderCourses();
  }

  function renderCourses() {
    const filtered = allCourses.filter(c => {
      const matchFilter = currentFilter === 'all' || c.status === currentFilter;
      const matchSearch = c.title.toLowerCase().includes(currentSearch) || c.sub.toLowerCase().includes(currentSearch);
      return matchFilter && matchSearch;
    });

    document.getElementById('courseGrid').innerHTML = filtered.map(c => `
      <div class="course-card" onclick="window.location.href='test.html'">
        <div class="course-icon" style="background:${c.color};">${c.icon}</div>
        <div class="course-title">${c.title}</div>
        <div class="course-sub">${c.sub}</div>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <span class="badge badge-gray">${c.chapters} chapters</span>
          <span class="badge badge-blue">${c.tests} tests</span>
        </div>
        <div class="progress-bar" style="margin-bottom:6px;"><div class="progress-fill" style="width:${c.pct}%;background:${c.pct>=80?'#10b981':c.pct>=40?'#1a56db':'#f59e0b'};"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:11px;color:var(--text-muted);">${c.pct}% complete</span>
          <span class="badge ${c.status==='completed'?'badge-green':c.status==='notstarted'?'badge-gray':'badge-blue'}">${c.status==='completed'?'Completed':c.status==='notstarted'?'Not started':'In progress'}</span>
        </div>
      </div>
    `).join('') || '<p style="color:var(--text-muted);font-size:14px;">No courses found.</p>';
  }

  renderCourses();
</script>
</body>
</html>
